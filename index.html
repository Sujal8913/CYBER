<!DOCTYPE html>
<html>
<head>
<title>Cyber AI Chat</title>

<style>
body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:url("background.jpg") center/cover no-repeat fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
z-index:-1;
}

#chat{
flex:1;
padding:20px;
overflow:auto;
}

.msg{
padding:12px;
margin:10px;
border-radius:10px;
max-width:70%;
color:white;
}

.user{
background:#10a37f;
margin-left:auto;
}

.bot{
background:#444654;
margin-right:auto;
}

#inputArea{
display:flex;
padding:10px;
background:rgba(0,0,0,0.7);
}

input{
flex:1;
padding:12px;
border:none;
border-radius:6px;
}

button{
padding:12px;
margin-left:10px;
background:#10a37f;
border:none;
color:white;
border-radius:6px;
}
</style>

</head>

<body>

<div id="chat"></div>

<div id="inputArea">
<input id="message">
<button onclick="sendMessage()">Send</button>
</div>

<script>

const chat=document.getElementById("chat");

function addMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.innerText=text;

chat.appendChild(div);

}

async function sendMessage(){

const input=document.getElementById("message");

const text=input.value;

if(!text)return;

addMessage(text,"user");

input.value="";

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data=await res.json();

addMessage(data.reply,"bot");

}

</script>

</body>
</html>
